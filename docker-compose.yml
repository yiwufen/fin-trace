# fin-trace + Docker Registry
#
# 部署流程（CI 触发）:
#   GitHub Actions SSH → 服务器 git pull → docker build (带代理)
#   → docker push localhost:5000 → docker compose pull → up -d
#
# Registry 仅供 localhost 访问，不对外暴露。

services:
  # ─── 应用 ───
  fin-trace:
    image: localhost:5000/fin-trace:latest
    pull_policy: always
    container_name: fin-trace
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "3001:3001"
    environment:
      - BASE_URL=https://fin.182-61-1-77.nip.io
      - HEADLESS=true
      - PORT=3001
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    networks:
      - default
      - knowledge-net

  # ─── 私有 Docker Registry（仅 localhost:5000）───
  registry:
    image: registry:2
    container_name: fin-trace-registry
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./registry-data:/var/lib/registry
      - ./registry-auth:/auth:ro
    environment:
      - REGISTRY_AUTH=htpasswd
      - REGISTRY_AUTH_HTPASSWD_REALM=fin-trace Registry
      - REGISTRY_AUTH_HTPASSWD_PATH=/auth/htpasswd
    networks:
      - knowledge-net

networks:
  knowledge-net:
    external: true
    name: repo_knowledge-net
