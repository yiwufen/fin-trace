name: Deploy

# CI: GitHub Actions 做类型检查 → SSH 触发服务器自构建部署
# 服务器有代理 (127.0.0.1:7890)，构建后推本地 Registry (localhost:5000)，
# docker compose pull + up -d，全程不走公网。

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typecheck
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --include-workspace-root && npm run typecheck

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10m
          command_timeout: 25m
          envs: REGISTRY_USER,REGISTRY_PASSWORD
          script: |
            set -euo pipefail
            cd ~/fin-trace

            # git 走代理（服务器无法直连 GitHub）
            export http_proxy=http://127.0.0.1:7890
            export https_proxy=http://127.0.0.1:7890

            echo "==> Pull latest code"
            git pull origin main
            SHA=$(git rev-parse --short HEAD)

            echo "==> Build image (with proxy)"
            docker build --network host \
              --build-arg BUILD_PROXY=http://127.0.0.1:7890 \
              -t localhost:5000/fin-trace:latest \
              -t localhost:5000/fin-trace:"${SHA}" \
              .

            echo "==> Push to local registry"
            mv ~/.docker/config.json ~/.docker/config.json.bak 2>/dev/null || true
            echo '{}' > ~/.docker/config.json
            echo "${REGISTRY_PASSWORD}" | docker login localhost:5000 -u "${REGISTRY_USER}" --password-stdin
            docker push localhost:5000/fin-trace:latest
            docker push localhost:5000/fin-trace:"${SHA}"
            mv ~/.docker/config.json.bak ~/.docker/config.json 2>/dev/null || true

            echo "==> Deploy"
            # docker compose pull 可能因 Docker Hub 网络问题失败（registry-1.docker.io EOF），
            # 但镜像已在 localhost:5000（上一步 push 成功），up 时会从本地 registry 拉取。
            # 故 pull 失败不阻塞部署。
            docker compose pull || echo "==> (pull 失败，继续用本地 registry 镜像)"
            docker compose up -d --remove-orphans

            echo "==> Cleanup old images"
            docker image prune -f

            echo "==> Health check"
            sleep 10
            if curl -fsS -o /dev/null http://localhost:3001/; then
              echo "OK: fin-trace is healthy"
            else
              echo "FAIL: fin-trace health check failed"
              docker compose logs --tail 30
              exit 1
            fi

            echo "==> Done"
            docker compose ps
